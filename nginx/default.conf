server {
    listen 80;

    server_name localhost;

    # Frontend
    location / {
        proxy_pass http://frontend:3000;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000/;
    }

    # Swagger docs
    location /api/docs {
        proxy_pass http://backend:8000/docs;
    }

    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
    }
}
