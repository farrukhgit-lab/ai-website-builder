services:
  backend:
    build: ./backend
    container_name: backend
    restart: always
    env_file:
      - .env

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

